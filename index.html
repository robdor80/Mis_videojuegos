<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Videojuegos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <i class="fa-solid fa-hard-drive"></i> Mis Videojuegos
        </div>
        <button id="btnAddGame" class="btn-icon">
            <i class="fa-solid fa-plus"></i>
        </button>
    </header>

    <main class="container">
        
        <section id="locationsSection">
            <h1 class="page-title">Mis Unidades</h1>
            
            <div id="locationsContainer" class="locations-grid">
                </div>
        </section>

    </main>

    <div id="formModal" class="modal">
        <div class="modal-content modal-scrollable">
            <span class="close-modal">&times;</span>
            <h2>Gestión de Inventario</h2>
            
            <form id="gameForm">
                <input type="hidden" id="docId"> <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" required placeholder="Ej: Cyberpunk 2077">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tipo">Tipo de elemento *</label>
                        <select id="tipo" required>
                            <option value="videojuego">Videojuego</option>
                            <option value="programa">Programa</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="ubicacion">Ubicación *</label>
                        <select id="ubicacion" required>
                            <option value="steam">Steam</option>
                            <option value="ubisoft">Ubisoft</option>
                            <option value="hdd1">HDD 1 (Kesu)</option>
                            <option value="hdd2">HDD 2 (WD Elements)</option>
                            <option value="m2">SSD M.2 (Fanxiang)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="tamano">Tamaño Base (GB) *</label>
                    <input type="number" id="tamano" step="0.01" required placeholder="0.00">
                </div>

                <div id="locationFields" class="conditional-section hidden">
                    <h3 class="section-divider">Datos Locales</h3>
                    
                    <div class="form-group-check">
                        <label>
                            <input type="checkbox" id="tieneUpdatesLocales"> Tiene Updates Locales
                        </label>
                        <div id="subFieldUpdates" class="sub-field hidden">
                            <label>Tamaño Updates (GB)</label>
                            <input type="number" id="tamanoUpdates" step="0.01">
                        </div>
                    </div>

                    <div class="form-group-check">
                        <label>
                            <input type="checkbox" id="tieneSavegame"> Tiene Savegame Local
                        </label>
                        <div id="subFieldSavegame" class="sub-field hidden">
                            <label>Notas del Savegame</label>
                            <textarea id="savegameNotas" rows="2" placeholder="Ej: Save respaldado..."></textarea>
                        </div>
                    </div>
                </div>

                <div id="typeFields" class="conditional-section">
                    <h3 class="section-divider">Datos Gráficos / Mods</h3>

                    <div class="form-group-check">
                        <label>
                            <input type="checkbox" id="dlss"> Soporta DLSS
                        </label>
                        <div id="subFieldDlss" class="sub-field hidden">
                            <label>Versión DLSS</label>
                            <input type="text" id="dlssVersion" placeholder="Ej: 2.5">
                        </div>
                    </div>

                    <div class="form-group-check">
                        <label>
                            <input type="checkbox" id="tieneMods"> Tiene Mods
                        </label>
                        <div id="subFieldMods" class="sub-field hidden">
                            <label>Tamaño Mods (GB)</label>
                            <input type="number" id="tamanoMods" step="0.01">
                            <label style="margin-top: 5px;">Descripción Mods</label>
                            <textarea id="modsDescripcion" rows="2" placeholder="Descripción..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label for="descripcion">Descripción General</label>
                    <textarea id="descripcion" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>Carátula / Imagen</label>
                    <input type="file" id="imageFile" accept="image/*">
                    <input type="hidden" id="imagenUrl">
                    <small style="color: #888;">Se subirá a Firebase Storage</small>
                </div>

                <button type="submit" class="btn-primary">Guardar</button>
            </form>
        </div>
    </div>

    <script src="js/data.js"></script> <script src="js/ui.js"></script>   <script src="js/form.js"></script> </body>
</html>
