<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="theme-color" content="#bb86fc">
    <meta name="description" content="Gestor de inventario de videojuegos y programas">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon.png">

    <title>Mis Videojuegos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="hero-header">
        <div class="header-top-bar">
            <div class="nav-icon" id="btnHome" title="Volver al Inicio">
                <i class="fa-solid fa-gamepad"></i>
            </div>
            
            <div class="header-actions">
                <button id="btnManageLocations" class="nav-icon btn-storage" title="Añadir Almacenamiento">
                    <i class="fa-solid fa-hard-drive"></i>
                </button>
                <button id="btnOpenReport" class="nav-icon btn-report" title="Informe PDF">
                    <i class="fa-solid fa-file-pdf"></i>
                </button>
                <button id="btnShowAll" class="nav-icon btn-show-all" title="Ver Todo el Inventario">
                    <i class="fa-solid fa-layer-group"></i>
                </button>
                <button id="btnAddGame" class="nav-icon btn-add" title="Añadir Nuevo">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">

        <section class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="¿Qué quieres jugar hoy?">
                <button id="btnSearch"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </section>
        
        <section id="locationsSection">
            <div id="locationsContainer" class="locations-grid"></div>
        </section>

        <section id="gamesSection" class="hidden">
            <div class="section-header">
                <h2 id="currentLocationTitle" style="font-size: 1.8rem; border-left: 4px solid #bb86fc; padding-left: 15px;">Listado</h2>
            </div>
            <div id="gamesContent"></div>
        </section>

    </main>

    <div id="formModal" class="modal">
        <div class="modal-content modal-scrollable">
            <span class="close-modal close-form-modal">&times;</span>
            <h2 id="formTitle">Gestión de Inventario</h2>
            <form id="gameForm">
                <input type="hidden" id="docId">
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" id="nombre" required placeholder="Ej: Cyberpunk 2077">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo *</label>
                        <select id="tipo" required>
                            <option value="videojuego">Videojuego</option>
                            <option value="programa">Programa</option>
                            <option value="otros">Otros</option> </select>
                    </div>
                    <div class="form-group">
                        <label>Ubicación *</label>
                        <select id="ubicacion" required>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Tamaño Base (GB) *</label>
                    <input type="number" id="tamano" step="0.01" required>
                </div>
                <div id="locationFields" class="conditional-section hidden">
                    <h3 class="section-divider">Datos Locales</h3>
                    <div class="form-group-check">
                        <label><input type="checkbox" id="tieneUpdatesLocales"> Updates Locales</label>
                        <div id="subFieldUpdates" class="sub-field hidden">
                            <label>GB Updates</label> <input type="number" id="tamanoUpdates" step="0.01">
                        </div>
                    </div>
                    <div class="form-group-check">
                        <label><input type="checkbox" id="tieneSavegame"> Savegame Local</label>
                        <div id="subFieldSavegame" class="sub-field hidden">
                            <textarea id="savegameNotas" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div id="typeFields" class="conditional-section">
                    <h3 class="section-divider">Datos Gráficos</h3>
                    <div class="form-group-check">
                        <label><input type="checkbox" id="dlss"> DLSS</label>
                        <div id="subFieldDlss" class="sub-field hidden">
                            <input type="text" id="dlssVersion" placeholder="v2.5">
                        </div>
                    </div>
                    <div class="form-group-check">
                        <label><input type="checkbox" id="tieneMods"> Mods</label>
                        <div id="subFieldMods" class="sub-field hidden">
                            <input type="number" id="tamanoMods" placeholder="GB"><textarea id="modsDescripcion"></textarea>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Descripción / Notas</label>
                    <textarea id="descripcion" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>URL Imagen *</label>
                    <input type="url" id="imagenUrl" required>
                </div>
                <button type="submit" class="btn-primary">Guardar Datos</button>
            </form>
        </div>
    </div>

    <div id="locationModal" class="modal">
        <div class="modal-content modal-scrollable">
            <span class="close-modal close-location-modal">&times;</span>
            <h2 id="locationFormTitle">Añadir Almacenamiento</h2>
            <form id="locationForm">
                <input type="hidden" id="locationDocId">
                <div class="form-group">
                    <label>Nombre del dispositivo *</label>
                    <input type="text" id="locationName" required placeholder="Ej: SSD Portátil 2TB">
                </div>
                <div class="form-group">
                    <label>Imagen *</label>
                    <input type="text" id="locationImageUrl" required placeholder="assets/locations/wd_3.0.png o https://...">
                </div>
                <div class="form-group">
                    <label>Capacidad máxima (GB) *</label>
                    <input type="number" id="locationCapacity" min="0.01" step="0.01" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Almacenamiento</button>
                    <button type="button" id="btnDeleteLocation" class="btn-danger hidden">Eliminar Almacenamiento</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content modal-scrollable">
            <span class="close-modal close-detail-modal">&times;</span>
            <div class="detail-layout">
                <div class="detail-image"><img id="detailImg" src="" alt="Carátula"></div>
                <div class="detail-info">
                    <h2 id="detailTitle">Título</h2>
                    <div class="detail-badges" id="detailBadges"></div>
                    <div class="detail-meta">
                        <p><strong>Ubicación:</strong> <span id="detailLoc"></span></p>
                        <p><strong>Tamaño Total:</strong> <span id="detailSize"></span> GB</p>
                    </div>
                    <div class="detail-desc-box">
                        <h4>Notas:</h4><p id="detailDesc"></p>
                    </div>
                    <div id="detailExtra" class="detail-extra-box hidden"></div>
                    <div class="detail-actions">
                        <button id="btnEditGame" class="btn-primary"><i class="fa-solid fa-pen-to-square"></i> Editar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="reportModal" class="modal">
        <div class="modal-content modal-scrollable report-modal-content">
            <span class="close-modal close-report-modal">&times;</span>
            <h2>Informe de Inventario</h2>
            <div class="report-toolbar">
                <div class="form-group">
                    <label>Mostrar</label>
                    <select id="reportTypeFilter">
                        <option value="all">Todo</option>
                        <option value="videojuego">Videojuegos</option>
                        <option value="programa">Programas</option>
                        <option value="otros">Otros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ordenar por</label>
                    <select id="reportSortOrder">
                        <option value="name">Nombre</option>
                        <option value="location">Lugar de almacenamiento</option>
                        <option value="size">Tamaño total</option>
                    </select>
                </div>
                <button id="btnDownloadReport" class="btn-primary" type="button">
                    <i class="fa-solid fa-print"></i> Imprimir PDF
                </button>
            </div>
            <div id="reportSummary" class="report-summary"></div>
            <div class="report-table-wrapper">
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Tipo</th>
                            <th>Ubicación</th>
                            <th>Base</th>
                            <th>Updates</th>
                            <th>Mods</th>
                            <th>Total</th>
                            <th>DLSS</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <button id="btnScrollTop" class="btn-scroll-top" title="Subir arriba">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/form.js"></script>
    <script src="js/report.js"></script>
    <script src="js/pwa.js"></script>

</body>
</html>
