<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Videojuegos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <div class="logo" onclick="window.location.reload()">
                <i class="fa-solid fa-gamepad"></i> <span class="logo-text">Mis Videojuegos</span>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Buscar título...">
            <button id="btnSearch"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="actions-container">
            <button id="btnAddGame" class="btn-add-floating" title="Añadir juego">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    </header>

    <main class="container">
        
        <section id="locationsSection">
            <h1 class="page-title">Mi Colección</h1> <div id="locationsContainer" class="locations-grid"></div>
        </section>

        <section id="gamesSection" class="hidden">
            <div class="section-header">
                <button id="btnBack" class="btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Volver
                </button>
                <h2 id="currentLocationTitle">Listado</h2>
            </div>
            <div id="gamesContent"></div>
        </section>

    </main>

    <div id="formModal" class="modal">
        <div class="modal-content modal-scrollable">
            <span class="close-modal close-form-modal">&times;</span>
            <h2 id="formTitle">Gestión de Inventario</h2>
            <form id="gameForm">
                <input type="hidden" id="docId">
                
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" id="nombre" required placeholder="Ej: Cyberpunk 2077">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo *</label>
                        <select id="tipo" required>
                            <option value="videojuego">Videojuego</option>
                            <option value="programa">Programa</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ubicación *</label>
                        <select id="ubicacion" required>
                            <option value="steam">Steam</option>
                            <option value="ubisoft">Ubisoft</option>
                            <option value="hdd1">HDD 1 (Kesu)</option>
                            <option value="hdd2">HDD 2 (WD Elements)</option>
                            <option value="m2">SSD M.2 (Fanxiang)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Tamaño Base (GB) *</label>
                    <input type="number" id="tamano" step="0.01" required>
                </div>

                <div id="locationFields" class="conditional-section hidden">
                    <h3 class="section-divider">Datos Locales</h3>
                    <div class="form-group-check">
                        <label><input type="checkbox" id="tieneUpdatesLocales"> Updates Locales</label>
                        <div id="subFieldUpdates" class="sub-field hidden">
                            <label>GB Updates</label> <input type="number" id="tamanoUpdates" step="0.01">
                        </div>
                    </div>
                    <div class="form-group-check">
                        <label><input type="checkbox" id="tieneSavegame"> Savegame Local</label>
                        <div id="subFieldSavegame" class="sub-field hidden">
                            <textarea id="savegameNotas" rows="2"></textarea>
                        </div>
                    </div>
                </div>

                <div id="typeFields" class="conditional-section">
                    <h3 class="section-divider">Datos Gráficos</h3>
                    <div class="form-group-check">
                        <label><input type="checkbox" id="dlss"> DLSS</label>
                        <div id="subFieldDlss" class="sub-field hidden">
                            <input type="text" id="dlssVersion" placeholder="v2.5">
                        </div>
                    </div>
                    <div class="form-group-check">
                        <label><input type="checkbox" id="tieneMods"> Mods</label>
                        <div id="subFieldMods" class="sub-field hidden">
                            <input type="number" id="tamanoMods" placeholder="GB"><textarea id="modsDescripcion"></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Descripción / Notas</label>
                    <textarea id="descripcion" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>URL Imagen *</label>
                    <input type="url" id="imagenUrl" required>
                </div>
                
                <button type="submit" class="btn-primary">Guardar Datos</button>
            </form>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content modal-scrollable">
            <span class="close-modal close-detail-modal">&times;</span>
            <div class="detail-layout">
                <div class="detail-image"><img id="detailImg" src="" alt="Carátula"></div>
                <div class="detail-info">
                    <h2 id="detailTitle">Título</h2>
                    <div class="detail-badges" id="detailBadges"></div>
                    <div class="detail-meta">
                        <p><strong>Ubicación:</strong> <span id="detailLoc"></span></p>
                        <p><strong>Tamaño Total:</strong> <span id="detailSize"></span> GB</p>
                    </div>
                    <div class="detail-desc-box">
                        <h4>Notas:</h4><p id="detailDesc"></p>
                    </div>
                    <div id="detailExtra" class="detail-extra-box hidden"></div>
                    <div class="detail-actions">
                        <button id="btnEditGame" class="btn-primary"><i class="fa-solid fa-pen-to-square"></i> Editar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/form.js"></script>

</body>
</html>
