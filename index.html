<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Videojuegos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <i class="fa-solid fa-hard-drive"></i> Mis Videojuegos
        </div>
        <button id="btnAddGame" class="btn-icon">
            <i class="fa-solid fa-plus"></i>
        </button>
    </header>

    <main class="container">
        
        <section id="locationsSection">
            <h1 class="page-title">Mis Unidades</h1>
            
            <div id="locationsContainer" class="locations-grid">
                </div>
        </section>

    </main>

    <div id="formModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Añadir Nuevo Título</h2>
            
            <form id="gameForm">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Ej: Cyberpunk 2077">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="tipo">
                            <option value="videojuego">Videojuego</option>
                            <option value="programa">Programa</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ubicación</label>
                        <select id="ubicacion">
                            <option value="steam">Steam</option>
                            <option value="ubisoft">Ubisoft</option>
                            <option value="m2">SSD Fanxiang (M.2)</option>
                            <option value="hdd1">Disco Kesu (HDD 1)</option>
                            <option value="hdd2">WD Elements (HDD 2)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tamaño (GB)</label>
                    <input type="number" id="tamano" step="0.01" placeholder="0.00">
                </div>

                <button type="button" class="btn-primary" onclick="alert('Funcionalidad de guardar pendiente de conectar a Firebase')">Guardar</button>
            </form>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>

</body>
</html>
