<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Mis Videojuegos</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logo">
                <i class="fa-solid fa-gamepad"></i> Mis Videojuegos
            </div>
            <button id="btnAddGame" class="btn btn-accent">
                <i class="fa-solid fa-plus"></i> <span class="btn-text">Añadir</span>
            </button>
        </div>
    </header>

    <main class="container">
        
        <section id="locationsSection">
            <h2 class="section-title">Mis Unidades</h2>
            <div id="locationsContainer" class="grid-locations">
                <p class="loading-msg">Cargando unidades...</p>
            </div>
        </section>

        <section id="gamesSection" class="hidden">
            <div class="sub-header">
                <button id="btnBackToLocations" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Atrás
                </button>
                <h2 id="currentLocationTitle">Listado</h2>
            </div>
            
            <div id="gamesContainer" class="grid-games">
                </div>
        </section>

    </main>

    <div id="gameModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="formModal" class="modal hidden">
        <div class="modal-content modal-form">
            <span class="close-form">&times;</span>
            <h2>Gestión de Título</h2>
            <form id="gameForm">
                <input type="hidden" id="docId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="nombre" required placeholder="Ej: Cyberpunk 2077">
                    </div>
                </div>

                <div class="form-row two-col">
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="tipo" required>
                            <option value="videojuego">Videojuego</option>
                            <option value="programa">Programa</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ubicación</label>
                        <select id="ubicacion" required>
                            <option value="steam">Steam</option>
                            <option value="ubisoft">Ubisoft</option>
                            <option value="hdd1">HDD 1</option>
                            <option value="hdd2">HDD 2</option>
                            <option value="m2">M.2 SSD</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tamaño (GB)</label>
                    <input type="number" id="tamano" step="0.01" required>
                </div>

                <div class="checks-container">
                    <label class="check-box">
                        <input type="checkbox" id="tieneUpdatesLocales"> Updates
                    </label>
                    <label class="check-box">
                        <input type="checkbox" id="dlss"> DLSS
                    </label>
                    <label class="check-box">
                        <input type="checkbox" id="tieneMods"> Mods
                    </label>
                    <label class="check-box">
                        <input type="checkbox" id="tieneSavegame"> Savegame
                    </label>
                </div>

                <div id="conditionalFields">
                    <input type="number" id="tamanoUpdates" placeholder="Tamaño Updates (GB)" class="hidden form-input-cond">
                    <input type="text" id="dlssVersion" placeholder="Versión DLSS" class="hidden form-input-cond">
                    
                    <div id="modsContainer" class="hidden form-input-cond">
                        <input type="number" id="tamanoMods" placeholder="Tamaño Mods (GB)">
                        <textarea id="modsDescripcion" placeholder="Descripción Mods"></textarea>
                    </div>

                    <textarea id="savegameNotas" placeholder="Notas Savegame" class="hidden form-input-cond"></textarea>
                </div>

                <div class="form-group">
                    <label>Imagen</label>
                    <input type="file" id="imageFile" accept="image/*">
                    <input type="hidden" id="imagenUrl">
                    <div id="uploadStatus"></div>
                </div>

                <button type="submit" class="btn btn-full btn-accent">Guardar Datos</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/form.js"></script>
</body>
</html>
